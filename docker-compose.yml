services:
  backend:
    build: ./backend
    container_name: notes-backend
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:5001/api
    container_name: notes-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: always